<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cement Order & Analysis Portal</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF and AutoTable for robust PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Hide scrollbar for clean modal */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <i data-lucide="hard-hat" class="w-8 h-8 text-yellow-400"></i>
                    <span class="font-bold text-xl tracking-wider">CEMENT PRO</span>
                </div>
                <div class="flex space-x-4">
                    <button onclick="switchTab('order')" id="tab-order" class="px-3 py-2 rounded-md text-sm font-medium bg-blue-900 focus:outline-none transition-colors">Order Form</button>
                    <button onclick="switchTab('analyze')" id="tab-analyze" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 focus:outline-none transition-colors">Analyze</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- ALERT BOX -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-md shadow-sm transition-all"></div>

        <!-- ==================== ORDER FORM TAB ==================== -->
        <section id="sec-order" class="bg-white rounded-xl shadow-md p-6 sm:p-8 border border-gray-200">
            <div class="flex justify-between items-center mb-6 pb-4 border-b">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <i data-lucide="clipboard-list" class="mr-2 text-blue-600"></i> Create New Order
                </h2>
                <div class="text-sm font-medium bg-gray-100 px-3 py-1 rounded text-gray-600">
                    Next Order ID: <span id="display-order-id" class="text-blue-600 font-bold">Loading...</span>
                </div>
            </div>

            <form id="orderForm" onsubmit="submitOrder(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <!-- Customer Info -->
                    <div class="space-y-4">
                        <h3 class="font-semibold text-gray-700 border-b pb-2">Customer Details</h3>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Customer Name</label>
                            <input type="text" id="customerName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Customer ID</label>
                            <input type="text" id="customerId" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                        </div>
                    </div>

                    <!-- Logistics Info -->
                    <div class="space-y-4">
                        <h3 class="font-semibold text-gray-700 border-b pb-2">Logistics Details</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Lorry Number</label>
                                <input type="text" id="lorryNumber" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Driver ID</label>
                                <input type="text" id="driverId" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Driver Name</label>
                            <input type="text" id="driverName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                        </div>
                    </div>
                </div>

                <!-- Cement Selection -->
                <div class="mb-8">
                    <h3 class="font-semibold text-gray-700 border-b pb-2 mb-4">Cement Types & Quantity</h3>
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6" id="cement-container">
                            <!-- JS will inject cement options here -->
                        </div>
                    </div>
                </div>

                <!-- Total & Submit -->
                <div class="flex flex-col sm:flex-row justify-between items-center border-t pt-6">
                    <div class="text-xl mb-4 sm:mb-0">
                        <span class="text-gray-600 font-medium">Total Amount:</span> 
                        <span class="text-3xl font-bold text-green-600 ml-2" id="totalAmountDisplay">$0.00</span>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full sm:w-auto flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 md:py-3 md:px-10 shadow-lg transition-transform hover:scale-105 disabled:opacity-50">
                        <i data-lucide="eye" class="mr-2"></i> Submit & Preview PDF
                    </button>
                </div>
            </form>
        </section>

        <!-- ==================== ANALYZE TAB ==================== -->
        <section id="sec-analyze" class="hidden">
            <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i data-lucide="bar-chart-2" class="mr-2 text-blue-600"></i> Order Analysis
                    </h2>
                    <button onclick="loadOrders()" class="flex items-center text-sm text-blue-600 hover:text-blue-800 font-medium bg-blue-100 px-3 py-1 rounded">
                        <i data-lucide="refresh-cw" class="w-4 h-4 mr-1"></i> Refresh Data
                    </button>
                </div>
                
                <div class="overflow-x-auto p-0">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Order ID</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Date</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">Customer</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-gray-600 uppercase tracking-wider">Total</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-gray-600 uppercase tracking-wider">Balance</th>
                                <th class="px-6 py-3 text-center text-xs font-bold text-gray-600 uppercase tracking-wider">Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="6" class="px-6 py-10 text-center text-gray-500">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- ==================== PREVIEW MODAL ==================== -->
    <div id="pdfPreviewModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Changed to flex items-center justify-center to guarantee dead-center alignment -->
        <div class="flex items-center justify-center min-h-screen p-4 text-center sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closePdfPreview()"></div>
            
            <div class="relative bg-white rounded-lg text-left shadow-xl transform transition-all sm:my-8 sm:max-w-4xl sm:w-full h-[85vh] flex flex-col">
                <div class="bg-blue-600 px-4 py-3 sm:px-6 flex justify-between items-center rounded-t-lg">
                    <h3 class="text-lg leading-6 font-bold text-white">Invoice Preview</h3>
                    <button onclick="closePdfPreview()" class="text-white hover:text-gray-200"><i data-lucide="x"></i></button>
                </div>
                
                <!-- Clean HTML View of the Receipt instead of iframe -->
                <div class="flex-grow p-6 bg-gray-200 w-full h-full overflow-y-auto flex justify-center items-start">
                    <div id="receipt-html-preview" class="bg-white p-8 shadow-md border border-gray-300 w-full max-w-2xl h-fit">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="bg-gray-50 px-4 py-3 sm:px-6 flex justify-end gap-3 rounded-b-lg">
                    <button onclick="closePdfPreview()" class="w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:w-auto sm:text-sm">
                        Close
                    </button>
                    <button onclick="downloadCurrentPdf()" class="w-full inline-flex justify-center items-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:w-auto sm:text-sm">
                        <i data-lucide="download" class="mr-2 w-4 h-4"></i> Download PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== ORDER DETAILS MODAL POPUP ==================== -->
    <div id="orderModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Changed to flex items-center justify-center to guarantee dead-center alignment -->
        <div class="flex items-center justify-center min-h-screen p-4 text-center sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            
            <div class="relative bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:max-w-2xl sm:w-full">
                <div class="bg-blue-600 px-4 py-3 sm:px-6 flex justify-between items-center">
                    <h3 class="text-lg leading-6 font-bold text-white" id="modal-title">Order Details</h3>
                    <button onclick="closeModal()" class="text-white hover:text-gray-200"><i data-lucide="x"></i></button>
                </div>
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div id="modal-content" class="text-sm text-gray-700">
                        <!-- Content injected via JS -->
                    </div>
                    
                    <!-- Payment Update Section -->
                    <div class="mt-6 border-t pt-4 bg-gray-50 p-4 rounded-md">
                        <h4 class="font-bold text-gray-800 mb-2">Update Payment</h4>
                        <div class="flex flex-col sm:flex-row gap-3 items-center">
                            <div class="flex-grow w-full relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="text-gray-500 sm:text-sm">$</span>
                                </div>
                                <input type="number" id="addPaymentAmount" min="0" step="0.01" placeholder="Enter received amount" class="pl-7 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                            </div>
                            <button onclick="submitPayment()" id="paymentBtn" class="w-full sm:w-auto bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 font-medium whitespace-nowrap shadow-sm">
                                Add Payment
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // !! IMPORTANT: Replace this URL with your Google Apps Script Web App URL !!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7KAX_lgC2FfSV1cs4qTWQuKeER_oGqXPJpdB3MY2_uw4KODonviCt8IO9-TRalgM7MQ/exec";

        // Helper to check if URL is properly configured
        const isScriptConfigured = () => SCRIPT_URL !== "YOUR_WEB_APP_URL_HERE" && SCRIPT_URL.trim() !== "";
        
        // Define Cement Types and Prices
        const CEMENT_CATALOG = [
            { id: 'opc', name: 'OPC (Ordinary Portland)', price: 10.50 },
            { id: 'ppc', name: 'PPC (Portland Pozzolana)', price: 9.00 },
            { id: 'src', name: 'SRC (Sulfate Resisting)', price: 12.00 }
        ];

        // Global State
        let currentOrderId = 100;
        let selectedOrderForPayment = null;
        let currentPdfDoc = null; // Store jsPDF object globally
        let currentPdfFilename = "Invoice.pdf";

        // Initialize Icons
        lucide.createIcons();

        // ==========================================
        // INITIALIZATION & UI LOGIC
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderCementOptions();
            fetchNextOrderId();
        });

        function switchTab(tab) {
            document.getElementById('sec-order').classList.add('hidden');
            document.getElementById('sec-analyze').classList.add('hidden');
            
            document.getElementById('tab-order').className = 'px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 focus:outline-none transition-colors';
            document.getElementById('tab-analyze').className = 'px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-700 focus:outline-none transition-colors';

            if(tab === 'order') {
                document.getElementById('sec-order').classList.remove('hidden');
                document.getElementById('tab-order').classList.add('bg-blue-900');
            } else {
                document.getElementById('sec-analyze').classList.remove('hidden');
                document.getElementById('tab-analyze').classList.add('bg-blue-900');
                loadOrders(); // Refresh table when opening analyze tab
            }
        }

        function showAlert(message, type = 'success') {
            const box = document.getElementById('alert-box');
            box.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            if(type === 'success') {
                box.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-300');
                box.innerHTML = `<div class="flex items-center"><i data-lucide="check-circle" class="mr-2"></i> ${message}</div>`;
            } else {
                box.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-300');
                box.innerHTML = `<div class="flex items-center"><i data-lucide="alert-circle" class="mr-2"></i> ${message}</div>`;
            }
            lucide.createIcons();
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        // ==========================================
        // FORM LOGIC
        // ==========================================
        function renderCementOptions() {
            const container = document.getElementById('cement-container');
            container.innerHTML = '';
            
            CEMENT_CATALOG.forEach(cement => {
                const html = `
                    <div class="bg-white p-3 rounded border shadow-sm flex flex-col justify-between">
                        <div class="flex items-center justify-between mb-3">
                            <label class="flex items-center space-x-2 cursor-pointer font-medium text-gray-700">
                                <input type="checkbox" value="${cement.id}" class="cement-checkbox form-checkbox h-5 w-5 text-blue-600 rounded" onchange="toggleQuantity('${cement.id}')">
                                <span>${cement.name}</span>
                            </label>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-500 font-semibold">$${cement.price.toFixed(2)} / unit</span>
                            <div class="flex items-center space-x-2">
                                <span class="text-sm text-gray-500">Qty:</span>
                                <input type="number" id="qty-${cement.id}" min="1" disabled class="w-20 border-gray-300 rounded shadow-sm focus:border-blue-500 focus:ring-blue-500 disabled:bg-gray-100 disabled:text-gray-400 p-1 text-right" oninput="calculateTotal()">
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function toggleQuantity(id) {
            const checkbox = document.querySelector(`.cement-checkbox[value="${id}"]`);
            const qtyInput = document.getElementById(`qty-${id}`);
            
            if (checkbox.checked) {
                qtyInput.disabled = false;
                qtyInput.value = 1;
                qtyInput.focus();
            } else {
                qtyInput.disabled = true;
                qtyInput.value = '';
            }
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            CEMENT_CATALOG.forEach(cement => {
                const checkbox = document.querySelector(`.cement-checkbox[value="${cement.id}"]`);
                const qtyInput = document.getElementById(`qty-${cement.id}`);
                
                if (checkbox.checked && qtyInput.value) {
                    total += cement.price * parseInt(qtyInput.value);
                }
            });
            document.getElementById('totalAmountDisplay').innerText = `$${total.toFixed(2)}`;
            return total;
        }

        // ==========================================
        // API COMMUNICATION & ACTIONS
        // ==========================================
        async function fetchNextOrderId() {
            if(!isScriptConfigured()) return;
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getNextOrderId`);
                const result = await response.json();
                if(result.status === 'success') {
                    currentOrderId = result.orderId;
                    document.getElementById('display-order-id').innerText = currentOrderId;
                }
            } catch (error) {
                console.error("Error fetching Order ID", error);
            }
        }

        async function submitOrder(e) {
            e.preventDefault();
            if(!isScriptConfigured()) {
                showAlert("Please configure your Google Apps Script Web App URL first.", "error");
                return;
            }

            // Gather Data
            const totalAmount = calculateTotal();
            if (totalAmount === 0) {
                showAlert("Please select at least one cement type and quantity.", "error");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader mr-2 w-5 h-5 border-2"></div> Processing...`;

            // Format Cement Details securely
            let cementDetailsArr = [];
            let pdfItemsData = []; // Array for jsPDF autoTable
            CEMENT_CATALOG.forEach(cement => {
                const checkbox = document.querySelector(`.cement-checkbox[value="${cement.id}"]`);
                const qtyInput = document.getElementById(`qty-${cement.id}`);
                if (checkbox.checked && qtyInput.value) {
                    const qty = parseInt(qtyInput.value);
                    const subtotal = cement.price * qty;
                    cementDetailsArr.push(`${cement.name} (${qty})`);
                    
                    // Add row data for jsPDF
                    pdfItemsData.push([
                        cement.name,
                        `$${cement.price.toFixed(2)}`,
                        qty.toString(),
                        `$${subtotal.toFixed(2)}`
                    ]);
                }
            });

            const orderData = {
                action: 'addOrder',
                date: new Date().toISOString().split('T')[0],
                customerName: document.getElementById('customerName').value,
                customerId: document.getElementById('customerId').value,
                lorryNumber: document.getElementById('lorryNumber').value,
                driverName: document.getElementById('driverName').value,
                driverId: document.getElementById('driverId').value,
                cementDetails: cementDetailsArr.join(', '),
                totalAmount: totalAmount
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Avoids CORS preflight
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();

                if(result.status === 'success') {
                    showAlert(`Order #${result.orderId} successfully created! Generating Preview...`);
                    
                    // Generate Preview and prepare jsPDF
                    previewPDF(result.orderId, orderData, pdfItemsData, totalAmount);

                    // Reset Form
                    document.getElementById('orderForm').reset();
                    renderCementOptions();
                    calculateTotal();
                    currentOrderId = result.orderId + 1;
                    document.getElementById('display-order-id').innerText = currentOrderId;
                } else {
                    showAlert(`Error: ${result.message}`, "error");
                }
            } catch (error) {
                showAlert("Network error. Please check your connection and script URL.", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="eye" class="mr-2"></i> Submit & Preview PDF`;
                lucide.createIcons();
            }
        }

        // ==========================================
        // PREVIEW HTML & PDF GENERATION
        // ==========================================
        function previewPDF(orderId, data, itemsData, total) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // === 1. Prepare jsPDF Object (Hidden in background) ===
            doc.setFontSize(22);
            doc.setTextColor(30, 58, 138); // blue-800
            doc.text("CEMENT PRO", 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text("Official Order Receipt", 14, 28);

            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`Order #: ${orderId}`, 140, 20);
            doc.text(`Date: ${data.date}`, 140, 26);

            doc.setDrawColor(200, 200, 200);
            doc.line(14, 32, 196, 32);

            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.text("Customer Information", 14, 42);
            doc.setFont(undefined, 'normal');
            doc.setFontSize(10);
            doc.text(`Name: ${data.customerName}`, 14, 48);
            doc.text(`ID: ${data.customerId}`, 14, 54);

            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.text("Logistics", 110, 42);
            doc.setFont(undefined, 'normal');
            doc.setFontSize(10);
            doc.text(`Lorry No: ${data.lorryNumber}`, 110, 48);
            doc.text(`Driver: ${data.driverName} (ID: ${data.driverId})`, 110, 54);

            doc.autoTable({
                startY: 65,
                head: [['Cement Type', 'Price / Unit', 'Quantity', 'Subtotal']],
                body: itemsData,
                theme: 'grid',
                headStyles: { fillColor: [30, 58, 138] },
                styles: { fontSize: 10 }
            });

            const finalY = doc.lastAutoTable.finalY || 65;
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(22, 101, 52); // green-800
            doc.text(`Grand Total: $${total.toFixed(2)}`, 140, finalY + 15);

            doc.setFontSize(9);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(150, 150, 150);
            doc.text("Thank you for your business. Generated automatically by Cement Pro System.", 105, 280, { align: "center" });

            // Store doc and filename globally for downloading later
            currentPdfDoc = doc;
            currentPdfFilename = `Order_${orderId}_${data.customerName.replace(/\s+/g, '_')}.pdf`;

            // === 2. Build HTML Preview inside the Modal ===
            let itemsHtml = '';
            itemsData.forEach(item => {
                itemsHtml += `
                    <tr class="border-b border-gray-200">
                        <td class="py-3 px-2 text-gray-800">${item[0]}</td>
                        <td class="py-3 px-2 text-center text-gray-600">${item[1]}</td>
                        <td class="py-3 px-2 text-center font-semibold">${item[2]}</td>
                        <td class="py-3 px-2 text-right font-semibold text-gray-800">${item[3]}</td>
                    </tr>
                `;
            });

            const previewHtml = `
                <div class="border-b-2 border-blue-800 pb-4 mb-6 flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-bold text-blue-800 tracking-wider">CEMENT PRO</h1>
                        <p class="text-gray-500 text-sm mt-1">Official Order Receipt</p>
                    </div>
                    <div class="text-right">
                        <h2 class="text-xl font-bold text-gray-800">Order #: ${orderId}</h2>
                        <p class="text-sm text-gray-600 mt-1">Date: ${data.date}</p>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row justify-between mb-8 gap-6">
                    <div class="w-full sm:w-1/2 bg-gray-50 p-4 rounded border">
                        <h3 class="font-bold text-gray-700 border-b pb-2 mb-3">Customer Information</h3>
                        <p class="text-sm mb-1"><span class="text-gray-500 font-medium">Name:</span> <span class="font-semibold text-gray-800">${data.customerName}</span></p>
                        <p class="text-sm"><span class="text-gray-500 font-medium">ID:</span> <span class="text-gray-800">${data.customerId}</span></p>
                    </div>
                    <div class="w-full sm:w-1/2 bg-gray-50 p-4 rounded border">
                        <h3 class="font-bold text-gray-700 border-b pb-2 mb-3">Logistics Details</h3>
                        <p class="text-sm mb-1"><span class="text-gray-500 font-medium">Lorry No:</span> <span class="font-semibold text-gray-800">${data.lorryNumber}</span></p>
                        <p class="text-sm"><span class="text-gray-500 font-medium">Driver:</span> <span class="text-gray-800">${data.driverName} (ID: ${data.driverId})</span></p>
                    </div>
                </div>

                <table class="w-full text-sm mb-8 border-collapse">
                    <thead class="bg-blue-800 text-white rounded-t-md">
                        <tr>
                            <th class="py-3 px-2 text-left font-medium">Cement Type</th>
                            <th class="py-3 px-2 text-center font-medium">Price / Unit</th>
                            <th class="py-3 px-2 text-center font-medium">Quantity</th>
                            <th class="py-3 px-2 text-right font-medium">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>

                <div class="flex justify-end">
                    <div class="w-full sm:w-72 border-t-2 border-gray-800 pt-3 flex justify-between items-center text-lg">
                        <span class="font-bold text-gray-700">Grand Total:</span>
                        <span class="font-bold text-green-700 text-2xl">$${total.toFixed(2)}</span>
                    </div>
                </div>
                
                <div class="mt-12 text-center text-gray-400 text-xs border-t pt-4">
                    <p>Thank you for your business. Generated automatically by Cement Pro System.</p>
                </div>
            `;

            document.getElementById('receipt-html-preview').innerHTML = previewHtml;

            // Show modal
            document.getElementById('pdfPreviewModal').classList.remove('hidden');
        }

        function closePdfPreview() {
            document.getElementById('pdfPreviewModal').classList.add('hidden');
        }

        function downloadCurrentPdf() {
            if (currentPdfDoc) {
                // Triggers the download of the jsPDF document we created in previewPDF()
                currentPdfDoc.save(currentPdfFilename);
                closePdfPreview();
            }
        }

        // ==========================================
        // ANALYSIS & MODAL LOGIC
        // ==========================================
        async function loadOrders() {
            if(!isScriptConfigured()) return;
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center"><div class="flex justify-center items-center"><div class="loader border-blue-600 mr-3"></div> Loading data...</div></td></tr>`;
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const result = await response.json();
                
                if(result.status === 'success') {
                    tbody.innerHTML = '';
                    if(result.data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">No orders found.</td></tr>`;
                        return;
                    }

                    result.data.forEach(order => {
                        const balance = parseFloat(order['Balance']) || 0;
                        const total = parseFloat(order['Total Amount']) || 0;
                        const statusBadge = balance <= 0 ? 
                            `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Paid</span>` : 
                            `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Pending</span>`;

                        // Store raw order data in attribute for modal
                        const encodedData = encodeURIComponent(JSON.stringify(order));

                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50 transition-colors cursor-pointer";
                        tr.onclick = () => openModal(decodeURIComponent(encodedData));
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${order['Order ID']}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order['Date']}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">${order['Customer Name']}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right font-semibold">$${total.toFixed(2)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-right">
                                <div class="font-bold ${balance > 0 ? 'text-red-600' : 'text-green-600'}">$${balance.toFixed(2)}</div>
                                ${statusBadge}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium text-center">
                                <button class="text-blue-600 hover:text-blue-900 bg-blue-50 p-1.5 rounded hover:bg-blue-100"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    lucide.createIcons();
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Failed to load orders. Verify URL.</td></tr>`;
            }
        }

        function openModal(dataString) {
            const order = JSON.parse(dataString);
            selectedOrderForPayment = order['Order ID'];
            
            // Calculate Outstanding Days
            const orderDate = new Date(order['Date']);
            const today = new Date();
            const diffTime = Math.abs(today - orderDate);
            const outstandingDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) - 1; // 0 days if same day

            const total = parseFloat(order['Total Amount']) || 0;
            const received = parseFloat(order['Received Amount']) || 0;
            const balance = parseFloat(order['Balance']) || 0;

            const html = `
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-50 p-3 rounded border">
                        <p class="text-xs text-gray-500 uppercase font-bold">Order Info</p>
                        <p class="font-bold text-lg text-blue-800">#${order['Order ID']}</p>
                        <p>Date: ${order['Date']}</p>
                        <p class="text-red-600 font-bold mt-1">
                            <i data-lucide="calendar" class="inline w-4 h-4"></i> Outstanding: ${outstandingDays} Days
                        </p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded border">
                        <p class="text-xs text-gray-500 uppercase font-bold">Customer</p>
                        <p class="font-bold text-gray-800">${order['Customer Name']}</p>
                        <p>ID: ${order['Customer ID']}</p>
                    </div>
                    <div class="bg-gray-50 p-3 rounded border col-span-2 sm:col-span-1">
                        <p class="text-xs text-gray-500 uppercase font-bold">Logistics</p>
                        <p>Lorry: <span class="font-semibold">${order['Lorry Number']}</span></p>
                        <p>Driver: <span class="font-semibold">${order['Driver Name']}</span> (${order['Driver ID']})</p>
                    </div>
                    <div class="bg-blue-50 p-3 rounded border border-blue-200 col-span-2 sm:col-span-1">
                        <p class="text-xs text-blue-600 uppercase font-bold">Cement Ordered</p>
                        <p class="font-medium mt-1">${order['Cement Details']}</p>
                    </div>
                </div>

                <div class="bg-gray-800 text-white rounded-lg p-4 grid grid-cols-3 text-center shadow-inner">
                    <div>
                        <p class="text-xs text-gray-400 uppercase">Total</p>
                        <p class="text-xl font-bold">$${total.toFixed(2)}</p>
                    </div>
                    <div class="border-l border-r border-gray-600">
                        <p class="text-xs text-gray-400 uppercase">Received</p>
                        <p class="text-xl font-bold text-green-400">$${received.toFixed(2)}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 uppercase">Balance</p>
                        <p class="text-xl font-bold ${balance > 0 ? 'text-red-400' : 'text-gray-300'}">$${balance.toFixed(2)}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('addPaymentAmount').value = '';
            
            if(balance <= 0) {
                document.getElementById('addPaymentAmount').disabled = true;
                document.getElementById('paymentBtn').disabled = true;
                document.getElementById('addPaymentAmount').placeholder = "Fully Paid";
            } else {
                document.getElementById('addPaymentAmount').disabled = false;
                document.getElementById('paymentBtn').disabled = false;
                document.getElementById('addPaymentAmount').placeholder = "Enter amount";
            }

            document.getElementById('orderModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
            selectedOrderForPayment = null;
        }

        async function submitPayment() {
            if(!selectedOrderForPayment) return;
            const amount = parseFloat(document.getElementById('addPaymentAmount').value);
            if(!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            const btn = document.getElementById('paymentBtn');
            btn.disabled = true;
            btn.innerText = 'Updating...';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'updatePayment',
                        orderId: selectedOrderForPayment,
                        addAmount: amount
                    })
                });
                const result = await response.json();

                if(result.status === 'success') {
                    closeModal();
                    showAlert(`Payment of $${amount} added successfully to Order #${selectedOrderForPayment}`);
                    loadOrders(); // Refresh table
                } else {
                    alert(`Error: ${result.message}`);
                    btn.disabled = false;
                    btn.innerText = 'Add Payment';
                }
            } catch (error) {
                alert("Network error.");
                btn.disabled = false;
                btn.innerText = 'Add Payment';
            }
        }
    </script>
</body>
</html>
